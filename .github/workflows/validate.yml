name: Validate

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/test-variants.sh"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/test-variants.sh"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

jobs:
  test-variants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run variant validation
        run: scripts/test-variants.sh
